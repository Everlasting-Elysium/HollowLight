# ===================================
# HollowLight — Hexo Theme Config
# ===================================

# 博主信息
author:
  name: "传奇绳匠"
  avatar: /img/avatar.svg
  bio: "这里是我的博客"
  level: 1
  credit_score: 900          # 信用分 (0–1200)，显示在 Header 进度条

# 导航菜单（key: 显示名称，value: 路径）
menu:
  推送: /
  归档: /archives/
  标签: /tags/
  相册: /album/
  伙伴: /friends/
  关于: /about/

# 社交链接（留空则不显示）
social:
  github: ""
  twitter: ""
  weibo: ""
  email: ""

# 背景图（支持 URL 或 /img/ 路径）
background: /img/bg.png

# 相册配置
album:
  data: source/_data/album.yml    # 相册数据文件路径
  columns: 4                       # 网格列数（桌面端）

# 友链数据文件
friends_data: source/_data/friends.yml

# 代码高亮
highlight:
  theme: one-dark

# 评论（预留，暂不实现）
comment:
  enable: false
  type: ""                         # waline / giscus / twikoo

# 页脚
footer:
  since: 2024
  icp: ""                          # 备案号，留空不显示

# 首页幕布
curtain:
  enable: true
  background:
    type: image        # image / video / gif
    url: https://images.unsplash.com/photo-1449824913935-59a10b8d2000?w=1200&q=80
  typewriter:
    - "这里是我的博客"
    - "记录代码与生活"
    - "探索未知的边界"

# 本地搜索（需要在博客 _config.yml 安装 hexo-generator-searchdb）
search:
  enable: true
